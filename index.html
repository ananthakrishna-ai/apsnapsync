<!DOCTYPE html>
<html>
<head>
  <title>Apsnap Uploader</title>
</head>
<body>
  <h2>Apsnap Live Uploader</h2>

  <input id="eventCode" type="text" placeholder="Enter Event Code" />
  <br><br>

  <button onclick="startUpload()">Start Upload</button>

  <script>
    const { remote } = require('electron');
    const start = require('electron').remote.getGlobal('startUpload');

    function startUpload() {
      const code = document.getElementById('eventCode').value;
      if (!code) {
        alert("Please enter event code");
        return;
      }
      start(code);
    }
  </script>
</body>
</html>
